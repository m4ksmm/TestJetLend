services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jetlend
      POSTGRES_USER: jetlend
      POSTGRES_PASSWORD: jetlend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jetlend -d jetlend"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
